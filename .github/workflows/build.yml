name: Build Spigot Plugin

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: JDK 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Maven ile derle
        run: mvn -B clean package

      - name: Jar dosyasını yükle (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: cape39-spigot-jar
          path: target/*.jar
